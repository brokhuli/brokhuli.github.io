name: Link Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress 'https://brokhuli.github.io' 'https://brokhuli.github.io/sitemap-index.xml'
          fail: false
          output: ./lychee-out.md

      - name: Open issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links detected by lychee"
          content-filepath: ./lychee-out.md
          labels: link-check, bug
